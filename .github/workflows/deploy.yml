name: Deploy to Ainstein VM

on:
  push:
    branches:
      - dev
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: thomas
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /home/thomas/Ainstein
            git pull origin ${{ github.ref_name }}
            sudo systemctl restart ainstein
            sleep 3
            sudo systemctl is-active --quiet ainstein || { sudo systemctl status ainstein --no-pager; exit 1; }
            echo "Deploy done — $(date)"
