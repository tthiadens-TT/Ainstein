name: Deploy to Ainstein VM

on:
  push:
    branches:
      - main

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check alle Python-bestanden
        run: |
          echo "Checking Python syntax..."
          find . -name "*.py" -not -path "./.venv*" -not -path "./.git*" \
            -exec python3 -m py_compile {} + && echo "✅ Alle bestanden syntactisch correct"

  deploy:
    needs: syntax-check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: thomas
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /home/thomas/Ainstein
            git fetch origin main
            git checkout main
            git pull origin main
            sudo systemctl restart ainstein
            sleep 3
            sudo systemctl is-active --quiet ainstein || { sudo systemctl status ainstein --no-pager; exit 1; }
            echo "Deploy done — $(date)"
