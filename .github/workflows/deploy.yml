name: Deploy to Ainstein VM

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reden voor handmatige herstart'
        required: false
        default: 'Handmatige herstart via GitHub Actions'

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check alle Python-bestanden
        run: |
          echo "Checking Python syntax..."
          find . -name "*.py" -not -path "./.venv*" -not -path "./.git*" \
            -exec python3 -m py_compile {} + && echo "✅ Alle bestanden syntactisch correct"

  deploy:
    needs: syntax-check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: thomas
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /home/thomas/Ainstein
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            # Herstel de verrijkte voice vanuit Drive (git reset overschrijft met GitHub-baseline)
            source .env 2>/dev/null || true
            python3 /home/thomas/Ainstein/scripts/restore_voice.py || echo "Voice restore mislukt — GitHub-baseline actief"
            sudo systemctl restart ainstein
            sleep 3
            sudo systemctl is-active --quiet ainstein || { sudo systemctl status ainstein --no-pager; exit 1; }
            crontab -l 2>/dev/null | grep -v 'run_backup.sh' | crontab -
            # Backfill historische Jamie-meetings (idempotent)
            python3 /home/thomas/Ainstein/scripts/backfill_jamie_meetings.py
            # Dashboard: genereer direct + voeg cron toe als nog niet aanwezig
            python3 /home/thomas/Ainstein/dashboard/generate.py
            (crontab -l 2>/dev/null | grep -q 'dashboard/generate.py') || \
              (crontab -l 2>/dev/null; echo "0 */6 * * * cd /home/thomas/Ainstein && python3 dashboard/generate.py >> logs/dashboard.log 2>&1") | crontab -
            # Slack-scraper: werkdagen 01:00, scrape laatste 2 dagen (vervang altijd — idempotent update)
            (crontab -l 2>/dev/null | grep -v 'scrape_slack.py'; echo "0 1 * * 1-5 cd /home/thomas/Ainstein && python3 scripts/scrape_slack.py --since \$(date -d '2 days ago' +\%Y-\%m-\%d) >> logs/scrape_slack.log 2>&1") | crontab -
            # Stijl-verrijking: elke maandag 04:00 — verrijkt voice vanuit bronmateriaal, slaat op in Drive, herstart service
            (crontab -l 2>/dev/null | grep -v 'update_stijl.py'; echo "0 4 * * 1 cd /home/thomas/Ainstein && set -a && source .env 2>/dev/null && set +a && .venv311/bin/python3 scripts/update_stijl.py >> logs/stijl.log 2>&1") | crontab -
            echo "Deploy done — $(date)"
