name: Stijl-update handmatig starten

# Handmatige trigger voor noodgeval of test.
# Normaal draait update_stijl.py als VM-cron (elke maandag 04:00).
# De cron wordt ingesteld via deploy.yml.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print output, niets schrijven)'
        required: false
        default: 'false'
        type: boolean

jobs:
  stijl:
    runs-on: ubuntu-latest
    steps:
      - name: Run stijl-update op VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: thomas
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /home/thomas/Ainstein
            set -a; source .env 2>/dev/null; set +a
            set -e
            DRY=${{ inputs.dry_run }}
            if [ "$DRY" = "true" ]; then
              .venv311/bin/python3 scripts/update_stijl.py --dry-run 2>&1 | tee -a logs/stijl.log
            else
              .venv311/bin/python3 scripts/update_stijl.py 2>&1 | tee -a logs/stijl.log
            fi
